# Vicinae bindings. This file is linked into ~/.config/hypr by dotfiles/vicinae.

# Replace Omarchy's default Walker binding during the Vicinae trial.
unbind = SUPER, SPACE
bindd = SUPER, SPACE, Vicinae launcher, exec, $HOME/.nix-profile/bin/vicinae toggle

# Use Vicinae's explicit new-instance mode instead of focusing an existing Ghostty.
unbind = SUPER, RETURN
bindd = SUPER, RETURN, New Ghostty, exec, $HOME/.nix-profile/bin/vicinae app launch --new com.mitchellh.ghostty
